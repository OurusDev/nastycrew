<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingresar - NASTYCREW</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="marca"><a href="index.html" style="text-decoration:none;">NASTYCREW</a></div>
  <nav>
    <a href="index.html">Catálogo</a>
    <div id="zona-usuario"></div>
  </nav>
</header>

<main class="contenedor">
  <h2 style="text-align:center; font-size:36px; margin-bottom:24px;">Ingresá a tu cuenta</h2>
  <div id="zona-mensaje"></div>
  <form class="formulario" id="form-login">
    <div>
      <label>Email</label>
      <input type="email" id="email" required>
    </div>
    <div>
      <label>Contraseña</label>
      <input type="password" id="password" required>
    </div>
    <button class="btn" type="submit">Ingresar</button>
    <p style="text-align:center; font-size:14px; color:#7a756c;">
      ¿No tenés cuenta? <a href="registro.html" style="color:#2f4b3c;">Creala acá</a>
    </p>
  </form>
</main>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
