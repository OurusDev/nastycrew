<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear cuenta - NASTYCREW</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="cinta-peligro"></div>

<header class="header">
  <a href="index.html" class="marca">NASTY<span>CREW</span></a>
  <nav>
    <a href="index.html">Catálogo</a>
    <div id="zona-usuario"></div>
  </nav>
</header>

<main class="contenedor">
  <h2 style="text-align:center; font-size:34px; margin-bottom:28px;">Creá tu cuenta</h2>
  <div id="zona-mensaje"></div>
  <form class="formulario" id="form-registro">
    <div>
      <label>Nombre y apellido</label>
      <input type="text" id="nombre" required>
    </div>
    <div>
      <label>Email</label>
      <input type="email" id="email" required>
    </div>
    <div>
      <label>Teléfono (para contactarte por la reserva)</label>
      <input type="tel" id="telefono" placeholder="Ej: 11 5555 5555">
    </div>
    <div>
      <label>Contraseña</label>
      <input type="password" id="password" required minlength="6">
    </div>
    <button class="btn" type="submit">Crear cuenta</button>
    <p style="text-align:center; font-size:13px; color:#8a8471; font-family:'Space Mono',monospace;">
      ¿Ya tenés cuenta? <a href="login.html" style="color:#17150f; text-decoration:underline;">Ingresá acá</a>
    </p>
  </form>
</main>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
