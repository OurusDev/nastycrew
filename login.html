<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingresar - NASTYCREW</title>
<link rel="icon" href="https://res.cloudinary.com/kmmt7hrn/image/upload/v1784406572/logo_kjutas.png?v=2">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="cinta-peligro"></div>

<header class="header">
  <a href="index.html" class="marca">NASTY<span>CREW</span></a>
  <nav>
    <a href="index.html">Catálogo</a>
    <div id="zona-usuario"></div>
  </nav>
</header>

<main class="contenedor">
  <h2 style="text-align:center; font-size:34px; margin-bottom:28px;">Ingresá a tu cuenta</h2>
  <div id="zona-mensaje"></div>
  <form class="formulario" id="form-login">
    <div>
      <label>Email</label>
      <input type="email" id="email" required>
    </div>
    <div>
      <label>Contraseña</label>
      <input type="password" id="password" required>
    </div>
    <button class="btn" type="submit">Ingresar</button>
    <p style="text-align:center; font-size:13px; color:#8a8471; font-family:'Space Mono',monospace;">
      ¿No tenés cuenta? <a href="registro.html" style="color:#17150f; text-decoration:underline;">Creala acá</a>
    </p>
  </form>
</main>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
